# ============================================================
# inventory.ini — EpicBook Ansible Inventory
#
# Single VM hosts both frontend and backend services.
# Both groups point to the same IP — Ansible runs all roles
# on one machine: Nginx + Node.js + MySQL
# ============================================================

[frontend]
EPICBOOK_IP ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/epicbook-vm

[backend]
EPICBOOK_IP ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/epicbook-vm

[all:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
backend_ip=127.0.0.1
